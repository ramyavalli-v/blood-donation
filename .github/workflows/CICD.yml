name: Build, Test, and Deploy Nuqta to AWS EKS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven repository
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build & Test
        run: mvn clean verify

      - name: Package app
        run: mvn package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1


  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      ###############################################################
      # (1) Configure AWS via OIDC (for kubectl access)
      ###############################################################
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      ###############################################################
      # (2) Login to Docker Registry
      ###############################################################
      - name: Log in to Docker Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      ###############################################################
      # (3) Build & Push Docker Image
      ###############################################################
      - name: Build Docker Image
        run: |
          docker build -t nuqta-app .

      - name: Tag Docker Image
        run: |
          docker tag nuqta-app:latest "${{ secrets.DOCKER_REPOSITORY }}:${{ github.sha }}"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKER_REPOSITORY }}:${{ github.sha }}"

      ###############################################################
      # (4) Configure kubectl for EKS
      ###############################################################
      - name: Configure EKS kubectl
        uses: silverlyra/setup-aws-eks@v0.1
        with:
          cluster: ${{ secrets.EKS_CLUSTER }}
          activate: "true"

      ###############################################################
      # (5) Deploy to EKS
      ###############################################################
      - name: Deploy to EKS
        run: |
          sed -i "s#IMAGE_PLACEHOLDER#${{ secrets.DOCKER_REPOSITORY }}:${{ github.sha }}#g" k8s/deployment.yaml
          
          kubectl apply -f k8s/
          kubectl rollout status deployment/nuqta-app -n production --timeout=5m

      ###############################################################
      # (6) Verify Deployment
      ###############################################################
      - name: Verify Pods
        run: |
          kubectl get pods -n production
